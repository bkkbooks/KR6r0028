body:
  text: 釋迦如來成道記唐太原王勃撰錢唐月輪山居慧悟大師賜紫道誠註釋迦者梵語也華言能仁即娑婆世界化佛之姓也謹按長阿含經云昔有轉輪王姓甘蔗氏聽次妃之譖擯四太子至雪山北自立城居以德歸人不數年間蔚為強國父王悔憶遣使往詔四子辭過不皈父王乃三歎曰我子釋迦因命氏焉如來者梵云多陀阿伽度秦言如來十號之一也謂從如實道來成正覺也成道者法王啟運之謂也夫諸佛之道無得為得非常道也且釋迦如來成道已來甚太久遠非即今世以慈悲大誓化現身相接物利生亦有始末故云成道唐書王勃高宗朝博士福時第三子也與兄勮勔俱有才名時稱為王氏三珠樹勃少與楊烱盧照隣駱賓王齊名海內號為四傑乾封中沛王聞其才名辟入府時諸王尚鬪鷄勃戲為檄英王鷄文高宗怒曰此即交搆之漸乃黜虢州參軍有滕王閣記釋迦畫像記維摩畫像碑並盛行於世觀夫釋迦如來之垂迹也觀夫者發語之端緒也釋迦如來見上註垂迹者祐法師云蓋聞菩提之為極也神妙寂通圓智湛照道絕形識之封理畢生滅之境豈實誕於王官寧真謝於固林哉但憫群萌長寢同歸大覺緣來斯化感至必應若應而不生誰與悟俗化而無名何以導世是以標號釋迦擅種剎利體域中之尊冠人天之秀然後脫履儲宮真觀道樹捨金輪而馭大千明玉毫而制法界此其所以垂迹也淨法界身本無出沒將紀化迹始末乃先談法身夫法身者即化身之本體清淨法界也強名頗多此不備敘秦僧肇云如來者法界為體形無不在量出規矩之外道超言議之表凝然湛寂非色非相不生不滅無來無去故云本無出沒大悲願力示現受生此句明有出沒也言大悲者佛四等心之一是佛道之根本以苦為用用在佛果故稱大也願者即大誓也力者十力也此十波羅密隨舉其二夫諸佛有大悲故不住涅槃有大智故不住生死有大願故所以涉苦彌勤從真入假方便有身故云示現受生洎兜率陀天梵云率兜陀或云覩史多華言知足即欲界第四天也涅槃經云此天欲界最勝故補處菩薩皆示生此天為教化眾生故為護明菩薩護明即釋迦佛因地於此賢劫過去人壽二萬歲時值迦葉波佛最後受當來成佛記時名也及生兜率亦用此名若今之慈氏也菩薩梵語具足云菩提薩埵此云覺有情從行立稱今略云菩薩降迦毗羅國梵云迦毗羅蘇都華言妙德城即中天竺也號一切義成梵云薩婆頗他悉陀華言一切義成即釋迦佛最初小字也或訛略云悉達瑞應經云菩薩王宮生時國中釋種同日生五百男子廐中象馬各生五百駒子宮中五百伏藏現海中五百商人採寶歸各獻珍琛父王見其瑞事故立此名攝大乘論云立名有五因謂因生類因相因假因輕賤因敬重太子立名因相也謂生時有多瑞相故金團天子選其家本行經云護明謂天人金團曰往昔補處菩薩托生之家須具六十種功德三代清淨汝下閻浮為我觀察金團曰迦毗羅城王名淨飯夫人名摩耶於諸世間具足功德清淨有大名稱堪生彼家護明曰善哉我定生彼自淨飯王為其父梵云首圖駄那此云淨飯本行經云謂財德純備故玉象乘日夫釋迦如來示生此土始終有其八相一兜率來儀相二嵐毗尼園降生相三四門遊觀相四逾城出家相五雪山示修道相六菩提樹下降魔成道相七鹿野苑轉法輪相八娑羅林下般涅槃相此初相也普曜經云菩薩當行白象形入胎何以故三獸渡河象窮底故示來於大術胎中梵語摩訶摩耶華言大術即佛母也是天臂城中善覺長者第八女也相師占曰此女當生轉輪聖王時淨飯王聞乃娶為妃本行經云摩耶夫人夢白象日輪右脇而入具以白王召相師問之曰女人此夢必生轉輪聖王矣嘗試論之經不云菩薩九十一劫不墮惡道如何最後生中有身為白象耶然婆娑論云此非實事以彼國尊日貴象凡有此夢為大吉祥欲令占者言之故示其相爾問曰最後生菩薩實受胎耶答華嚴經云為欲成就小心劣解眾生不欲彼作念是自然化生功德智慧不從修得是故示現受胎又云菩薩在母胎中室樓珍殿一如天宮行住坐臥不令母有苦患日日三時十方諸佛入來安慰說受生法門十方同行菩薩及諸天人皆入問訊聽法以此明證非實事也金輪作王輪王有四一鐵輪王治一天下二銅輪王治二天下三銀輪王治三天下四金輪王統治四天下有七寶千子七寶者一金輪二玉女三馬四象五主藏神六主兵臣七如意珠此七物聖王受位之日皆自空來由是凌虗周遊四天一切國土見金輪飛至皆自臣伏本行經云太子生已善相者云具三十二相顯著必為轉輪聖王創誕於無憂樹下此第二嵐毗尼園降生相也瑞應經云摩耶夫人胎月將滿思遊此園到已即舉右手攀無憂樹枝從右脇而生太子天帝以天妙衣裹手承接天人持金抦傘蓋諸天龍神散香華皷音樂十方大地六種震動有三十二種瑞應事文多不錄按今古論衡周書異記云姬周昭王二十四年甲寅歲四月八日江河泉井泛溢山川宮殿震動常星不現有五色光貫大微宮王問群臣太史蘇由奏曰西方有聖人生却後千年教法來此王令鐫石埋於南郊誌之八十種隨形之妙好餐若芬華婆娑論云八十種好在諸相間隨諸相轉莊嚴佛身言芬華者具足梵語芬陀利華此云白蓮華涅槃經云如來之身非胎所污如芬陀利華本性清淨故三十二大士之相儀皎如圓月涅槃經云示現三十二相以自莊嚴如十五日夜盛滿之月四方而各行七步瑞應經云菩薩初生之時無人扶持於四方面各行七步自然蓮華承足華嚴經云現於世間最無比故金剛仙記云如來示行有三種一運神通凌虗而行二自然蓮華承足三行時足底離地四指千輻輪相印地分明九水而共沐一身普曜經云菩薩生時九龍在空降微細雨不冷不熱浴菩薩身現優曇華優曇鉢羅華金輪王生此華方現以世間有名難見故喻佛出世難值也如是本行集經云阿私陀僊白大王曰如優曇鉢羅華無量無邊億百千年時一出現佛亦如是阿含經云當觀如來出世如優曇鉢羅華涅槃經云佛如優曇華值遇生作師子吼因果經云太子生時一手指天一手指地作大師子吼云天上天下惟我獨尊夫世間師子百獸之長也一吼有四事一百獸聞則腦裂二香象降伏三飛鳥墮落四水族潛伏今喻佛聲盖取無畏之義也亦有四事一佛聲說法百法俱破二天魔降伏三外道邪見墮落四一切煩惱伏斷法喻平等其若此也言胎分之已盡早證常身常身者淨法界法身也法華經云如來成佛已來甚大久遠若然者則胎分已盡不受後有今何生耶為度以還來今垂化迹諸佛之心大慈悲是也以眾生界無盡故大悲亦無盡所以為度眾生出現世間爾問曰佛既成道久遠具大自在何不直便化生成佛何用入胎誕脇耶答曰大善權經云菩薩欲不由胎生一頃成佛恐彼小心劣解眾生疑是變化不肯受教若生貧賤設易出家人謂避飢寒故是以示入胎誕脇生帝王家種種順俗而後出家於是還覉襁褓示類嬰兒涅槃經云如來身者即是法身非是血肉筋骨所成隨順世間眾生法故示為嬰兒釋名曰𦚾前曰嬰提之嬰前以乳養之故曰嬰兒為占相也悲悵於阿私陀仙梵云阿私陀華言無比是西域長壽仙人有人倫之鑒本行經云淨飯王詔阿私陀仙相太子其仙悲啼哽咽王問其故仙曰太子具三十二相八十種好分明顯著非是轉輪聖王決定出家成佛轉大法輪安樂一切眾生我今自慨年耆不見法化失其大利故悲悵爾往効祠也驚起於大自在廟瑞應經云淨飯王嚴駕抱太子謁大自在天神廟時諸神像悉起禮拜太子足父王驚嘆曰我子於天神中更尊勝宜字天中天此即佛第二小字也或為童子華嚴經云現居童子地欲示現通達世間一切事業故或學聲聞天竺大論有五明一聲明二工巧明三毉方明四因明五內明其聲明論釋詁訓天竺聰明者方教之太子周學五明此舉其一則四從之為講武也箭塔箭井猶存太子師羼提提婆此云忍天學武本行經云太子年十五與諸釋種鬪射一箭穿透七金皷又一箭徹一鐵猪其箭透出著地入土幽泉迸涌時天帝釋取其箭歸忉利天上建塔盛貯供養此天上四塔之始一也其泉涌處人名為箭井唐三藏西域記云箭井在迦毗羅城東南三十里其水味甘如醴病者飲之即愈民于今利之為捔力也象跡象坑仍在經云太子與弟難陀調達出園捔力已調達前行見一大象當門以手搏之而斃次難陀出見象當途引手拽之道傍後太子出見用左手提起右手托而擲之象墮城外地為之陷故呼為象坑受欲樂於十歲色聲香味觸此之五塵欲界生者無不貪著為樂故名欲樂本行經云太子在宮具足五欲娛樂自在十年不曾外出故云受樂十歲現遊觀於四門此第三四門遊觀之相為出家之張本也樂沙門身厭老病死沙門者出家弟子之通稱也本行經云太子宮中樂極思遊園苑王勑嚴淨街衢莊嚴園觀選一智臣為侍備於顧問初出東門淨居天人化一老人尫羸倚杖太子見問侍臣曰此何人耶答曰此老人也問何名老人答昔曾少壯以寒暑迭遷血氣衰變人生世間無免老者次出南門天化一病人太子問侍臣答此病人也夫人嗜欲不節飲食過度四大不調轉變成疾眾痛迫惱存亡無期人生無有免者次出西門天化一死人太子問侍臣答曰此死人也以壽數向盡精魄已去四大各離六根無覺父母妻子情深愛重無能留者世人無貴賤無賢愚皆不免死太子由是情思不悅迴駕歸宮或問曰經云王勑嚴淨街衢瓦礫草不容遺餘安有病死之人敢當法駕之前耶答本行經云淨居天人挾緣而化惟太子侍臣見之乃至侍臣應答皆天力使之然也問曰天何人哉而強化斯事答皆菩薩夙世同行善友知識以誠誓所持故常隨左右作諸變相俾太子在樂生厭不忘出家也太子次出北門天化一沙門持錫掌鉢徐行駕前太子問曰汝何人耶答我佛弟子沙門也問何名沙門答曰三界兮擾擾六趣兮昏昏識心達本源故號為沙門言訖騰空而去太子瞻仰而喜曰惟此為快哉當修學於是還宮於是澡缾天子以驚覺彰伎女之醜容太子因四門歷觀諸相忻厭之意愈一日由是父王益其伎樂以悅之每至夜分有淨居天人名澡缾住在空中發言驚䇿復使樂器皆出五欲非樂世間無常涅槃寂靜速須出離之聲乃至令眾伎女熟睡衣裳披露不淨流溢太子歷見倍增厭離夫如來於淨法界大悲心中現斯影事豈實愛欲樂而待空言賴警䇿而生厭離若然則與凡夫何別耶盖欲教化世間而示同世間之業也大方等無相經云若言如來實生王宮乃至八相成佛則是謗如來淨居天人以捧持躍車匿而嚴駕此第四逾城出家相也至此據大乘宗說太子已年二十九歲車匿者太子御人也本行經云太子屢以出家心白父王父王語曰汝當作轉輪聖王七寶千子統四天下如何以剃髮染衣為樂耶太子對曰期成正覺統御大千攝化眾生令出長夜豈以七寶四天下為好耶父王但加侍衛增伎樂曉夜惑之一夜淨居天人於空中告太子曰行矣時也乃召車匿𩌎馬王犍陟至太子上馬四夜叉承馬足天人持盖梵王居左帝釋侍右天王從衛使國官諸門自然間闢守禦者都不覺知乘虗而行至雪山苦行林中詰旦已行八百里華嚴經云最後身菩薩法爾如是欲令著家眾生捨離家法為現自在不屬它故宣揚出家功德勝故是以示現出家逾春城於八夜當二月八日夜半時逾城出家按論衡云周昭王四十二年壬申之歲也棲雪嶺於六年言六年者是太子在雪山示修苦行究竟之數人辭愴戀王之心人謂御人車匿也本起經云太子至山語車匿曰所難作事汝與揵陟已能作之可但還國車匿悲啼悶絕曰言如何教我獨還宮中馬䑛落連珠之淚馬王犍陟聞太子言已屈膝䑛太子足淚下不絕揮寶刀而落紺髮塔天宮本行經云太子自以寶裝佩刀左手握紺青之髮而發願云我今落此髮誓與眾生斷除煩惱及與習障尋即截下擲向空中天帝釋接往忉利天建塔安貯供養此天上四塔之二也將袞服以貿皮衣形參山鹿本行經云太子自顧衣裳非出家者所服時淨居天人化作獵人披袈裟衣太子見乃脫珍服換得披著喜曰我今始為出家人也如經云天人化作獵人披袈裟者梵語此云壞色盖非五方正色此惟佛法出家者所服然西域獵人多竊此衣著入山者山中多師子見此色衣謂是沙門即不害之彼天欲太子問此衣即為讚嘆衣之功德故又經云換鹿皮衣又車匿白太子言如何捨彼妙衣皆與諸麋鹿同處耶扣林仙之所得了世定之非真此第五雪山修道相也林仙者謂苦行林中外道也所得者外道所修之定謂心帶異計忻上厭下而修雖得生天乃是世間有為有漏故云世定假令修得非想非非想定壽八萬劫限滿仍前墮落欲界或生三惡道酬償夙業金剛經頌云饒經八萬劫終是落空亡即世定也本行經云太子至雪山苦行林中問諸仙曰汝勤苦修行當求何果仙曰求生諸天太子不悅捨而前行至阿藍迦蘭并頭藍弗二大仙處問四空處定作是思惟俱非究竟解脫之法亦捨而去食麥食麻降苦降樂本行經云太子至伽耶山尼連河側思惟觀察一切眾生根緣六年後方可度之乃示修苦行日惟食一麻一麥以此自試是降樂也後悟此非真修乃受美食洗浴香塗是降苦也且瑤琴奏曲必自中而曲成此釋成降苦樂意也如佛在日有大富長者子名億耳投佛出家為求道故日夕精勤苦行乃至足破血流久無所證將欲反道佛知之問曰汝在家日能彈琴耶答能佛問絃太急太緩時如何答聲不成曲又問絃得中時如何答曲韻方成佛言我法中出家求道者亦如是太急則疲倦太緩則懈怠得中則其道成矣億耳奉教不月證阿羅漢果佛果圓因亦假中而果滿此句合前喻也梵云佛陀此云覺謂自覺覺陀覺行圓滿今略稱佛也果即二空大涅槃也因謂六度萬行也謂求佛圓果非太急太緩可成惟處中方成矣由是擇其處也過龍窟處謂菩提場也在閻浮提地方之中三世諸佛皆向此處成道故須擇也本行經云菩薩往菩提場彼路有一龍王名迦茶其龍長壽曾見往古三佛成道瑞相乃以眷屬具香華音樂幡盖迎菩薩供養又至文鱗盲龍在處水邊坐放光照水龍目暫開亦備香華音樂出水迎奉供養龍有七頭以身繞佛三迊昂頭覆菩薩頂浴其身也入連河經云菩薩入尼連河浴時有諸天持種種華香散河中浴訖時有樹神按樹枝低手引菩薩出水登岸示其食也受難陀之乳糜涅槃經云如來之身已於無量阿僧祇劫不受飲食為諸聲聞說先受二牧牛女乳糜故本行經云菩薩將往道樹時有天人告善生林主二女一名難陀華言喜二名婆羅華言力曰汝可最初施食於是二女以乳烹糜其釜上現種種瑞相乃用鉢盛奉獻菩薩食已將其鉢擲向尼連河中天帝釋收歸天上建塔安置供養此四塔之三也示其座也受吉祥之茆草天竺坐法必敷草為藉時天帝釋化為刈茆人菩薩問其名答名吉祥乃受其茆茆色青綠柔軟光滑若孔頂以最後之勝體補處菩薩只此一身更不受後有故云最後勝體詣菩提之道場梵云菩提華言道謂佛在彼成道故曰道場西域記云在摩竭國尼連河西南十里有樹名菩提本行集經云菩薩將至彼處色界諸天先以天繒幡盖懸於樹上用為標幟圓解脫之深因解脫者障惑俱遣縱任無礙塵累不能拘世趣不能攝能令修短改度巨細相容即是所證之聖果也言深因者謂三祇中所修一切行願并二空根本智此時功滿故云圓也登金剛之寶座俱舍論云此座下連金輪故云金剛座三世諸佛皆於此座成道古今有此土僧親至禮拜供養一百四十功德不共二乘依法相宗佛不共功德有一百四十謂三十二相八十種好十力四無所畏三念住三不護四一切清淨大慈大悲無忘失一切種妙智惟佛果具足故云不共八萬四千法門高超十地為世之則謂之法眾聖所由謂之門以眾生塵勞有八萬四千故法門之數亦爾盖病以藥對待也言十地者一歡喜地二離垢地三發光地四𦦨慧地五難勝地六現前地七遠行地八不動地九善慧地十法雲地瑜伽論云永斷最極微細煩惱及所知障無著無礙於一切種所知境界現正等覺故名佛地在十地之上故云高超也由是魔軍威懾於慈刀悉怖旅歸此第六菩提樹下降魔成道相也如來至此三十五瑜伽論云魔有四種一天魔二死魔三煩惱魔四五陰魔今言魔軍即天魔也理實四魔俱降從顯立談故云天魔本行集經云菩薩初坐道場即放眉間一光名降魔直照魔王宮殿令失常也一時震動魔將兵眾現種種可畏形狀各執器仗欲害菩薩是時菩薩入慈心三昧一切刃首皆生蓮華由是魔眾驚懾潰散媚女敗毒於定心羸變質魔有四女端正無倫共來菩薩前呈諸姿態欲壞梵行時菩薩以慈心力四女皆變為老醜羸弱之狀羞愧而退於是堅窂地神踊躍而作禮觀佛三昧經云彈王問佛汝之功德誰為證明佛即垂無畏手指地一切大地六種震動時堅牢地神涌出唱言我是證明虗空天子展轉而報知菩薩成佛已地神報空神空神報天神乃至上天展轉相報類蓮華而出水赫煥無方涅槃經云如來出世清淨無染猶如蓮華若桂月以懸空光明洞徹涅槃經云如來出世猶如秋月十五夜清淨圓滿無雲翳一切眾生無不瞻仰經七日受提謂之蜜警以少小之言七日者如來成道已來日數也提謂者北竺二商人也蜜者天竺常食也本行經云佛成道七日有樹神告二商人一名提謂一名波利云汝可備供養如來於是各獻蜜佛受之為說布施因果故云少小之言垂一音授賈客之戒歸賜與人天之福佛聲無漏故云一音賈客即提謂也戒謂五戒歸謂三歸持戒果報死生天上次生人間故云賜與人天之福夫諸佛教化常法有其七要先發人心一說布施二說持戒三說生天果報四說果報樂味五說果報過患六教離世間七難涅槃功德今方成道投機觀根且說歸戒爾既成佛已觀所化緣觀察何者堪先度脫悲二仙而不遇雷音二僊謂阿藍迦蘭并頭藍弗也念此二外道垢薄根利欲先度之彼死七日嗟其不遇正法華嚴經云震實法雷音雷音者如來具五種聲之一也喜五人而堪從法化五人者一憍陳如二䟦提離三婆沙波四阿奢輪五摩訶南佛次觀此五人在鹿野苑根緣僅僅熟可以度然以塵根昧劣聖智淵深一切煩惱能坌污淨心目之為塵是生死之本故名根也唯佛一切種妙智於三世一切法照見無不自在故曰聖智順其法則法不應根順其根則根不達法如來化儀法有權實眾生所欲根有大小大根者授以小法若內穢食於寶器小根者說與大乘猶使蚊負於高山苟不觀根則人法俱失莫不為愛河之長溺緣痴樂之所盲順正理論云愛者三界貪也隨所樂境轉能汩沒有情喻之河也眾生不能自出經無數時故云長溺癡者謂三界無明也使不見正道謂之盲夫一切眾生皆具正眼與佛無異但由無明妄想覆蔽不見正道故法華經云眾生諸根鈍著樂癡所盲苟不利於當聞仍假言而入滅此方便張本也法華經云若但讚佛乘眾生沒在苦不能信是法墜於三惡道我寧不說法疾入於涅槃於是忉利帝釋雲驅於三十三天梵云多羅夜登陵舍訛略云忉利華言三十三天謂妙高山頂有四朵每朵有八天中間帝釋所居善現宮善法堂共成三十三也帝釋者即彼天王梵云釋迦提婆上聲那因秦言能主總師三十三天王也堪忍界王霧擁於一十八梵梵語娑婆或云索訶薩訶華言堪忍即大千界之都名也自誓三昧經云謂此土人剛強難忍故云堪忍也界王即大梵天王是娑婆世主也言一十八梵者謂初禪有三天謂梵眾梵補大梵二禪有三天謂少光無量光光音三禪有三天謂少淨無量淨遍淨四禪有九天謂福生福愛廣果無想無煩無熱善現善見色究竟共有一十八天也禪之與梵皆清淨義雲駈霧擁者來見佛時眾多如是也頭面作禮致敬精專請轉法輪隨宜說頭面著地五輪具足是佛法中上品禮蓋敬之至也觀請者五法中一也具自他二利故諸佛凡有所說皆名轉法輪也梵王帝釋皆觀請人也隨宜說者方便之義也如來尋念善逝通規順古佛之嘉謨應群機之鄙欲如來者即釋迦也善逝自過去佛也謂成等正覺已出生死長夜具一切種智二利功德善事已畢故云善逝通規嘉謨皆佛方便善巧也鄙欲者樂小之心也法華經云尋念過去佛所行方便力我今所得道亦應說三乘于時十方佛現同興讚美之詞如來思惟方便之時十方諸佛皆現前讚云善哉釋迦文第一之導師可用方便隨宜說法一法乘分共創塵勞之域此方便門開也涅槃經云一乘之法隨宜說三生死煩惱界中謂之塵勞域由是起道樹詣鹿園此第七鹿野苑轉法輪相也道樹者成佛處菩提樹也既受勸請將轉法輪離彼樹下故云起也鹿園者即初轉法輪處也西域記云在波羅奈國昔釋迦佛因地修菩薩行時化身為鹿王名善鹿王提婆達多名惡鹿王各有五百眷屬同止此林時國王名梵摩達遊獵此林二鹿王并眷屬俱在圍中時善鹿王遂至王前啟白王曰大王挍獵燎原之次我徒一千死在今日然鹿死肉多即日腐臰願王恩宥許日供一鹿入王大厨王有割鮮之膳我徒延朝夕之命王善其辭遂俞所請其兩群內日輪一鹿未甞敢失一日當次惡鹿群一雌鹿鹿有胎故告王延俟後期不𠃔乃投善鹿王王曰悲哉慈母恩及未形汝自安心吾當可代時善鹿王自詣王厨宰夫奏王問其故對曰今日次一雌鹿有胎乞延下次無宜代者然一日之命誰不保惜我今不忍又慮失供故自赴厨願王聽許王歎曰善哉汝有此心我乃獸心爾當斷肉味無復日供乃施此林為養鹿之園佛觀此地有昔因緣首來說法報地恩也三月調根五人得度憍陳如悟慈尊之首喝剏解標名三月調根者俟其時也佛觀五人根緣僅熟乃往化度猶未信受佛現神變種種調練計經三月乃為三轉四諦十二行法輪五人中憍陳如先悟解得法眼淨即證阿羅漢佛稱為阿若憍陳如為出世第一弟子梵云阿若華言解故云剏解標名也餘四人相次得道且憍陳如或云陳那此云火器蓋祖先因事火命姓也率先得度蓋有宿因按因果經云釋迦因地為忍辱仙人在一山中修道時憍陳如為國王名歌利受性暴惡一日將諸婇女入山獵倦假寐時諸侍臣入林採華行至仙人菴前仙為說法良久王窹不見諸女擕劒尋覔見在仙菴前王怒問曰汝何人答忍辱仙人又問得上地定耶答未王曰既未得上定乃是凡夫遂拔劒截下仙手足見仙神色不動遂問汝恨我耶仙曰不恨願我成佛先度於王今既得道先度陳如即歌利王也舍利弗逢馬勝以傳言於途見諦梵云舍利弗多此云鶖子從母立名也始為刪闍耶外道弟子愽達十八大論辨才無敵然常慨所學所師俱非真正又鄙外道事行麤惡一日途次逢馬勝比丘持錫掌鉢衣裳楚楚行步徐雅悅而問之汝師是誰馬勝報曰佛大沙門是我之師又問說何法答曰我出家日淺而無強記今略以一偈相示曰諸法因緣生亦從因緣滅我佛大沙門常作如是說于時舍利弗言下悟解諦者實義也馬勝即鹿苑初度五人中阿奢輪也採菽氏繼踵以師事率門屬以同歸採菽氏即大目乾連姓也先與舍利弗同師甞立要云若得甘露願共分之其日見舍利弗歸神色怡悅乃問之兄得勝法耶舍利弗乃說其所遇仍以偈示目連亦悟正理相謂曰外道之法徒勞耳二人同心各領徒二百五十人投佛出家佛命善來鬚髮俱落袈裟著身佛告大眾此二弟子舍利弗智慧第一目乾連神通第一迦葉氏彚跡以降心領火徒而迴席迦葉氏即事火外道優婁頻羅姓也佛欲化之故往寓宿迦葉辤無舘舍佛指龍堂答云龍性暴惡恐害於仁佛言無畏即攝衣自入中坐至夜龍歸見佛遂怒放火燒佛佛入火光三昧擔宇洞然龍竄無所惟見佛鉢清涼乃躍入其中迦葉是夕見火熾然謂其徒曰彼沙門必受苦矣至旦佛擎鉢出示於迦葉心既稍伏請佛少住供養然未肯受法佛現五百神變方乃歸依與徒二百五十人一時剃落出家障盡意解成阿羅漢所有祭火器悉棄水中有親弟二人居于下流一名伽耶一名那提亦事火龍見流中祭器奔來看省見兄已成沙門問其故兄為說法亦與徒二百五十人投佛出家皆證道果彚類也優婁為類首二弟從之易云拔茅彚征之謂也各與其徒棄火事佛故云迴席莫不甘露洪澍末尼普應甘露者天之上味喻一乘妙法也末尼者或云摩尼此云無垢即珠寶也以其珠體圓瑩對物現色喻佛自在普應群機隨根授法也天界人界天界者佛成道二十七日在他化自在天宮天王請說十地經後來又在彼說般若理趣經在摩醯首羅天宮說文殊千鉢經在忉利天宮普遍光明閣說一字奇特佛頂經并為母摩耶夏三月說法等人界者謂五竺十六諸國等處鸚林尸林鸚林者百緣經云佛自舍衛國行詣摩竭提國中途有鸚鵡林其鸚鵡王并諸眷屬飛翔宮中迎請世尊眾僧願於我林一宿使我供養佛即許之與僧俱入林中坐定鸚鵡眾見佛相好光明眾僧威儀寂靜各生歡喜信心同日命終生忉利天尸林者涅拌經云佛一時在恒河岸尸首林中爾時世尊取少樹葉告諸比丘我今手中葉多耶一切大地葉多諸比丘言世尊一切大地葉多不可稱計如來手中少不足言佛言我所覺了一切諸法如大地草木葉為諸眾生所宣說者如我手中葉也或鷺池王舍城迦蘭陀竹林園有白鷺池佛說第十六會般若經或鷲嶺在王舍城梵云耆闍崛山是也佛說大般若并法華等諸經或海殿佛在難陀龍王宮吉祥摩尼寶藏大雲道場寶樓中說大雲輪請雨經或菴園菴摩羅果名也園中多植此果佛說淨名等經或獼猴江近毗耶離城有獼猴池池上有山精舍佛在中入不動三昧度五百商人皆證阿羅漢時大眾問佛耶輸陀羅比丘尼及五百商人往昔因緣等或火龍窟西域記云北印土城西有大洞窟是瞿波龍王所居其龍忽發惡心欲害王壞國佛知乃運神足往彼龍王見佛歡喜惡心乃息佛為說法授不殺戒因請留佛住此受我供養佛言吾將寂滅今為汝留影至吾滅度後汝惡心若起當觀吾影仍遣五百羅漢住此受汝供養作福田也因茲國王城邑永無憂患記云唐三藏弉法師親往禮拜供養佛影遠望則金色炳耀近則無視或住波羅奈正梵語云波羅痆斯華言江遶國佛說出曜時世轉法輪等經或居摩竭提唐言無恚害國佛說華嚴本起賢愚等經或依堅固林梵云沙羅此云堅固瑤法師譯云堅林即佛臨滅最後說大般涅槃等經或止音樂樹在維耶離城佛居樹下說灌頂拔除生死得度經或海濵楞伽頂山在南天竺海邊梵云楞伽華言不可往唯得神通者可到佛居彼說經名入楞伽山經或山際補陀岩梵語具云補怛洛迦今訛略云補陀此云小白華謂此山多生此華香氣遠聞是觀自在菩薩住處佛在彼說十一面觀自在經或迦蘭陀竹園梵云迦蘭陀華言好音即西域禽名也謂迦蘭陀長者同類婆娑羅王同施立精舍請佛眾住止或舍衛國金地梵云室羅伐訛云舍衛華言聞物城其中有長者名須達拏華言善施常賑恤孤貧國人重之同號給孤獨長者因往王舍城護彌長者家為子求婦見其家備設香華飲饌來日請佛須達拏本事外道乍聞佛名心寒毛竪是夜便往禮佛聞法即發先業得正信心便證初果遂請佛歸國佛許之及歸家卜勝地惟祇陀太子園高爽方廣堪建精舍往白太子太子戲曰若布金滿園即我當賣須達喜曰此園屬我矣歸家運金亥布八十頃由是買得建立精舍曰祇桓今呼佛寺為金地金田者因此也或應念而空現波斯匿王及末利夫人遇佛信法已共言我女勝鬘聰慧利根通敏易悟若得見佛必速得道宜遣信報之勝鬘聞佛功德歡喜頂受說偈贊佛願佛慈慜令我得見作此念時釋迦如來忽於空中現無比身勝鬘見之對佛說十受三願等一十五章名勝鬘經或沒山而出宮佛從鷲峯山沒忉利宮出須彌山沒炎摩宮出乃至已上說華嚴等經或說法假於六方優婆塞戒經云善生長者子白佛言外道諸師教人晨朝禮六方則得長壽富貴佛法中有此禮否佛言亦有所謂禮東方是檀波羅密多禮南方尸波羅蜜多禮西方羼提波羅蜜多禮北方毗梨耶波羅蜜多禮下方禪波羅蜜多禮上方般若波羅蜜多若能日日正觀禮拜供養即得長壽富貴或化身變為三尺懼師羅長者身長三尺佛為教化令歸正法亦化身長三尺經所謂應以此身得度者即現此身而為說法是也或掌覆而指變掌覆者楞嚴經云世尊以閻浮檀金手摩阿難頂即時十方普佛世界六種震動微塵如來住世界者各放寶光同時來祇陀林灌阿難頂焉指變者淨名經云螺髻梵王語舍利弗言我見此土如自在天宮舍利弗言我見此土丘陵坈坎穢惡充滿於是世尊以足指按地即此時三千大千世界皆是七寶莊嚴如寶莊嚴佛國或光流佛來或一身普集於多身法華經大樂說菩薩欲見釋迦如來分身諸佛爾時世尊放白毫相光遍照十方各五百萬億那由佗河沙佛土是時諸佛各將一大菩薩而為侍者皆來此土如是諸佛皆是釋迦佛所化之身或此界便明於他界觀無量壽佛經韋提希夫人求生淨土爾時世尊即現十方諸佛淨土令韋提希目觀自選願生何處韋提希即指阿彌陀佛國我願生彼佛教修十六觀或變淨而以淨覆穢佛方便報恩經佛放大光照十方佛剎有無量百千諸菩薩至此時娑婆世界無諸山川林藪等又法華經三變土田十方嚴淨又仁王經佛為大眾現不可思議神變令一佛土入無量佛土無量佛土入一佛土淨復現穢穢復現淨或隨俗而即俗明真佛所說法不出二諦二諦者俗諦真諦也或言在俗諦而理歸真實或即俗即真或因俗明真仁王經波斯匿王問言勝義諦中有世俗諦否佛言我今無說汝今無聽無說無聽是名一義二義也又十六國王咸作是念世尊大慈普得利益我等如何護國由是如來因此說菩薩護佛果真實甚深般若若空谷之答響洪鐘之待扣矣此如來隨機赴感說法也其間所說阿含四有般若八空佛成道三十年內說此二教蓋隨機投根故也梵云阿含華言法歸是小乘教有四部一長阿含二中阿含三雜阿含四增一阿含此教說一切法有故名四有梵云般若華言淨慧是大乘教說一切法空有八部故云八空密嚴華嚴佛藏地藏此四部大乘經名也言地藏即十輪經也思益天之請問思益者一梵天人名也請問法義從人立題楞伽山之語心入楞伽山經大乘經也此經以心為宗故云語心萬行首楞嚴首楞嚴者三昧名也此經從所詮立題一乘無量義無量義處亦三昧名也從所詮立稱大悲芬陀利梵云芬陀利此云白蓮華從喻彰名也法炬陀羅尼梵云陀羅尼此云總持以法總持有寂照之用喻如炬此從能喻所喻二名立稱無垢稱之說經梵云維摩羅詰華言淨名或云無垢皆一義蓋譯者巧拙也須達拏之瑞應梵云須達拏此云善施即釋迦因地作太子捨一妻二子時之名也此經從所詮立題
