body:
  text: 唐太原王勃撰錢唐月輪山居慧悟大師賜紫道誠注本事本生之別諷頌重頌之殊此十二分教之四名類揚論云本事者謂如來説聖弟子前世等事本生者謂如來説菩薩本所修行相應等事梵云伽他此云諷誦謂以妙之言緝為讚詠等梵云祇夜此云應頌如經云欲重宣此義而説偈言是也象馬兔之三獸渡河次第喻菩薩緣覺聲聞人也河喻十二因緣也三人同悟而深淺不同矣婆沙論云三獸渡河兔浮水上馬及一半象窮水底羊鹿牛之三車出宅法華經三車喻也羊車喻聲聞乘鹿車喻緣覺乘牛車喻菩薩乘三乘俱以運載為義前二乘是方便施設惟大白牛車是實引重致遠運載萬有不遺一物者也宅者經云三界無安猶如火宅又三界之身為邪見之宅也或謂之有空守中也此敘如來化儀説教不同也初説有教次説空教皆為不了義守在中道不務速説俟其時也或謂之無轉照持也空教但破有病緣未顯真靈之性只以一切差別之相為法法是俗諦照此諸法無為無相無生無滅無增無減等義是真諦此之無字非斷滅無蓋是遮詮意顯真空妙有真靈之性令展轉推照任持修證也或謂之頓也漸也且衆生之根有利有鈍故佛説教有頓有漸今就教有化儀頓漸應機頓漸就人有教授方便頓漸根性悟入頓漸發意修證頓漸或謂之半也滿也涅槃經云半字者是煩惱言説之本滿字者是一切善法言説之本但半字是不了義滿字是了義或無説而常説般若經云汝勿謂如來有所説法若人言如來有所説法則為謗佛是人不解我所説義有頌云始於鹿野苑終至跋提河中間五十年未曾説一字此約如來離法界外及三世諸佛同故云無説若約俗諦則何嘗不説或不聞而恆聞淨名經云夫説法者無説無示其聽法者無聞無得此皆約第一義諦也或保任而可憑法華經云我今為汝保任此事終不虗也此約一切衆生皆有佛性皆得成佛也或加被而不忘阿難佛成道後二十年方為侍者佛前後所説法或不聞或粗聞乃至過去佛所説盡能憶念以佛加被力故寶積經云如來以佛神力加諸有情令念宿住而告之曰汝今應念於過去世已種如是諸善法根彼諸有情以如來力隨念皆知無小而不大此融會教體也小謂小乘大謂大乘以如來逗根不同而法無大小之別也文殊問經云佛言未來世二十部小乘譬如海水無有異味皆從般若波羅蜜多出故無邊而不中有無二見良由惑見殊致及乎會歸中道則泯然一味矣三乘同入一佛乘涅槃經云一乘者名為佛性以是義故一切衆生皆有一乘也法華經云十方佛土中惟有一乘法無二亦無三三性同歸一法性法性者佛性也涅槃經云聲聞性緣覺性菩薩性無有差別同一法性也真可謂父母孩孺導師險夷涅槃經云佛念一切衆生猶如赤子故佛為衆生慈父母也法華經云今為汝等作大導師知諸生死險難長遠言險者即三界生死惡趣也夷者即一乘妙道也華嚴經云佛於一切衆生如慈父廣大利益故如慈母出生佛種故為導令究竟至安穩處故為師令入真實法中故懸日月於幽宵金光明經云無上佛日大光普照又云安住三界如日照晝華嚴經云月有四奇特一映蔽一切星宿光明二隨時示現盈虧三於世間澄清水中影無不現四一切見者皆對目前如來出世亦復如是一映蔽一切二乘外道二隨其所宜示現壽命長短三一切世界清深心衆生菩提器中影無不現四一切衆生有瞻對者皆謂如來惟現我前隨其心樂而為説法又大婆娑論云月麗高天有二種利益一照於幽暗二滋長草木佛出世間亦有二利益一照破無明癡暗二滋長人天善根言幽宵者謂生死界也惟識論云未登真覺常處夢鄉故我説為生死長夜布舟航於幻海如來大智大慈具運載衆生度生死岸與樂之用故喻舟航也一切有為法虗妄造作轉變不實喻如幻術也煩惱奔流汩沒有情難渡彼岸喻如海也為雲為雨使枯稿以還滋法華經云如來出世如大雲起雨於一切卉木藥草隨分受潤一切衆生為煩惱燒煮法水未洽謂之枯稿如來出世大慈大悲隨根説法衆生本有善根因之增長故云還滋為救為歸指窮途於壽域救護也歸趣也梁僧亮法師云主救於國親護於家佛則不爾一切皆救護也生死曠遠無際乏於法財資用謂之窮途涅槃常住不隨世法遷變謂之壽域暨乎所作已辦功成不居將返本以還源類薪盡而火滅此第八雙林般涅槃相也如來度生緣畢謂之所作已辦將息大用示歸真寂謂之功成不居本之與源皆一真法界也法華經云佛此夜滅度如薪盡火滅華嚴經云如來為示一切有為行法非安隱故為諸人天樂著色身示無常力不可轉故十方諸佛不入涅槃際為調伏衆生示現滅度息用名滅非斷滅也繇是指力地諸金河拘尸羅城多産有力之士諸國無敵故號力士生地梵云㕧離剌拏伐底或訛略云跋提華言有金河是産閻浮檀金處水之淨莫過此河梁僧宗法師云佛來此河邊入滅有意且河流奔注喻生死遄速金沙不動喻佛性常住如來因地修行時在此處六捨轉輪聖王身命今來此入滅為報地恩故光流面門相驚塵剎山搖地動俱興苦痛之聲面門者口也放光表最極之相也佛光佛聲山搖地震皆相也塵剎者無數佛國也涅槃後分經云十方世界一切震動出大音聲唱言苦哉痛哉如何一旦世間孤露慧日滅沒喪真慈父一切大海混濁涌沸苦痛之聲遍滿世界梁僧瑤法師云無情尚爾況有心者哉異類變容同現奢華之血涅槃經云一切天龍八部人民悲惱痛切身皮血見如波羅奢華梁僧亮法師釋云天竺有此華其葉白其脈赤也受純陀之後供梵云純陀此云解妙義是拘尸城工巧之子來白佛言為令世間得善果報受我最後之供佛許之或問曰經云人天四衆國王豪族皆來獻供如來皆不受何故受此工巧子微供耶答曰亮法師釋云佛意不欲棄少從多遺卑就勝而純陀生地雖賤而志德甚大苟有其道不在貴賤使廁下之徒皆不自輕也言志德大者蓋悟常住法又有言曰為令世間得善果報天王人王并諸豪族雖競獻珍妙諒闕此心亦如左傳云黍稷非馨明德斯馨矣問經云如來之身如全劑金剛無所熟二藏在世洎滅何故受食耶答此非實事涅槃經云如來之身已於無量阿僧祗劫不受飲食為諸聲聞説先受二牧女乳糜為諸衆生復受純陀後供又菩薩處胎經云至九地菩薩方見如來食時言捷疾天人接佛所食將往十方世界施作佛事若維摩化人取香積佛飯也納毗夜之密言毗字合作卑字梵云波卑夜譯云惡是魔王波旬名也涅槃經云魔王持寶獻供上佛并説呪護法佛言我受汝呪為護將來衆生及四部弟子故唱四德以顯三伊四德者常樂我淨此四是涅槃果也三伊者謂般若解脫法身此三是涅槃體也梵書伊字只三點一點在上表法身兩點在下左點表般若右點表解脫此約能依所依論也涅槃經云如來唱言我今安住如是三法為衆生故名入般涅槃指萬有而歸一性萬有者有情大數也一性者佛性也如來至涅槃會上方直指一切衆生皆有佛性訓多羅迦葉四十二請問已周涅槃會上有多羅聚落迦葉氏菩薩申三十四問首言云何得長壽金剛不壞身復以何因緣得大堅固力云何於此經究竟到彼岸等按梁武帝為高僧寶亮法師製涅槃經義疏序略云發迦葉之憤悱吐真實之誠言三十四問參差異辨方便勸誘各隨言答今言四十二是澤州遠法師疏分開也度須跋陀羅八十一化緣將畢梵云須跋陀羅華言善賢是外道之師聞佛説涅槃甚深之義智超惑亡投佛出家佛命善來比丘鬚髮自落袈裟挂身即席證阿羅漢果年已八十一佛記言此我最後得度弟子也破十仙之橫計使獲朝聞十仙者涅槃經云一闡提首那二婆私吒三先尼四迦葉氏五富那六淨梵志七犢子八納衣梵志九弘廣婆羅門十須跋陀羅此十仙皆是外道上首有大名稱國王師重其徒實繁於涅槃會上各肆本宗所見競縱偽辨問難如來如來一一破其宗計由是詞窮理盡亡羊多岐同歸一路即席皆證道果朝聞者道也論語云朝聞道夕死可矣建四塔之崇規遐滋末葉此謂人聞四塔也一如來生處塔二如來成道處塔三如來轉法輪處塔四如來般涅槃處塔將欲明有為之有滅表無相以無生有為者世諦法也一百法中九十四法皆生滅法般若云一切有為法如夢幻泡影如露亦如電無相者真諦也無為法性衆偽已盡非一切相故非生滅也上升金剛身往復虗空界涅槃經云如來以黃金色身示諸大衆言我於纍劫修難行苦行得此金剛不壞之身我今化緣已畢將入涅槃汝等細觀今日則有明日即無乃從寶牀上升空中高七多羅樹如是七反復歸寶牀日月其猶墜落螢光如何久留日月天壽五百歲即人間一千八百萬歲以人壽百年比之若螢火也教示勝光王經云日月有神用勢力放大光明遍照世間終歸隱沒無常經云大地及日月時至皆歸盡誡有常身使無放逸四大五蘊三十六物是無常身而凡夫外道計之為常涅槃經云佛言我於往昔為汝等故無量劫捨身命財求無上菩提是故汝等於我滅後應廣修行速出三有勿復懈怠散心放逸此如來最後垂誡於是還登玉座首臥鶴林還登者如來自空下也玉座者即所臥寶牀也首臥者謂北首臥也天竺以北為上故又表佛涅槃後遺法久熾北天故佛涅槃處有樹梵云娑羅華言堅固四方各二合則成八高五丈上合下離其樹佛滅時枯悴變色如白鶴故云鶴林遍遊三昧之門將復一真之性三昧者正定也一切聖人所由故曰門也一真性者法界也涅槃經云大涅槃者是諸佛如來法界逆入順入全超半超此敘遍遊三昧門也涅槃經云如來臨般涅槃時入初禪初禪出入二禪如是乃至四空處天入滅盡定此名順入若出滅定入非非想天定乃至出初禪此名逆入若初禪入三禪出三禪入空處出乃至非非想處出此名半超若初禪入乃至非非想天定出此名全超如是超禪經七反復乃告大衆我以佛眼遍觀三界一切諸法無明本際性本解脫以是因緣我今安住常寂滅光名大般涅槃依四禪之等持湛三點之圓寂涅槃經云世尊於娑羅林下寢寶牀上於其中夜入第四禪寂然便般涅槃等持者梵云三摩地謂平等任持一聚心心所法令不散亂深取所緣名等持即七定之一也今言依四禪合是根本定梵云馱那演那此云靜慮婆沙論云此定定慧平等餘定闕少不名靜慮此通有漏無漏有心不通無心湛者寂然也三點者見上伊字注圓寂者涅槃也梵云波利眤縛南此云圓寂圓謂德無不備寂謂障無不盡故今稱涅槃亦梵語之略具足應云般利涅槃那華言普究竟謂一切煩惱結習普究竟故是時也人天叫躃鳥獸哀唬飄風驟雲山吼波逆此略敘佛涅槃時變異之相文可解也按古今論衡云佛涅槃時當此土周穆王五十二年壬申之歲二月十五日也是日暴風急起發損人舍摧折林木山川大地宮殿震動穆王問羣臣太史扈多奏西方聖人入滅哀相現爾涅槃經師子吼菩薩問曰如來何故二月十五而般涅槃佛言春陽之月華木榮茂鳥獸孚乳衆生多起常想如來為破如是想故若以世壽算佛止此年七十九歲矣金光明經信相菩薩作是思惟釋迦如來壽命短促方八十年于時所居忽然廣博嚴淨有四如來現在其前而告之曰一切諸水可知幾滴諸須彌山可知斤兩一切大地可知塵數虗空分界可知邊際無有能算釋尊壽命不應生疑案輪王之古式方俟葬儀涅槃經云阿難問佛葬法如何佛言當依轉輪聖王儀式命力士以捧持竟無能動拘尸城力士諸國無匹共舉金棺竟不能動此時摩耶夫人自忉利天下至涅槃處執佛衣鉢鍚杖唬動悶絶爾時如來金棺自開起身合掌問訊慈母遠屈下來諸行法爾願勿啼泣阿難白佛後人設問如何應答佛言但云佛涅槃後摩耶夫人下來佛為將來不孝衆生從金棺起合掌問訊應如是答繇是金棺自舉繞拘尸之大城涅槃經云如來欲令一切衆生得平等福金棺自舉升虗空中徐徐而行天人龍神香華音樂隨繞供養自拘尸城西門入東門出南門入北門出如是出入經于七反人民瞻禮訖然後自至茶毗香臺之上寶炬不然駐闍維之盛禮梵云闍維此云焚燒經云一切人天皆執寶炬欲然香薪火到皆滅阿難告衆曰如來待大迦葉故未然也莫不未生怨在於王舍創結夢於十號慈尊未生怨即王舍城主阿闍世王小名也佛涅槃時王臥疾得五惡夢及窹方知佛已入滅十號謂如來應供正遍知明行足善逝世間解無上士調御丈夫天人師佛世尊也慈者大慈四等心之一也大迦葉遠下雞峰獲瞻禮於千輻輪足雞峯者山有三峯如仰布雞足名雞足山摩訶迦葉在彼住止去拘尸城遠聞佛入滅不運神足將五百衆奔至雙林七日方到佛出雙足於棺外示之迦葉瞻禮悲泣見足底千輻輪相金色炳耀説偈讚訖於是如來出大音聲我以正法眼付汝當作依止然後佛足還入棺中如故畢以兜羅緻㲲聖火自焚兜羅者天竺綿也緻㲲者天竺貴布也依轉輪王葬式纏褁全身火既不然迦葉語曰如來金剛之身非世間火而能燒之於是如來以大悲力從心卍字中涌火而自然之故云聖火爇王衆栴檀之薪注帝釋金瓶之水荼毗香薪皆天王人王所奉故曰王衆栴檀也帝釋先告佛乞半身舍利歸天供養佛唯許右頰上齶一牙洎火已焚七日而烈𦦨未滅龍王作念撲滅是火先取舍利皆盡力不能沃滅及天帝釋躬持金瓶注水火乃息矣見褁佛身千㲲唯著身并最上二㲲宛在中間諸㲲皆為灰燼其頂骨乃四牙燦然不動帝釋稟教惟取所許一牙迎歸天宮建塔安置供養此天上第四塔也彼願力猶在悲心尚熏碎金剛之勝身為舍利之遺骨一切佛始發心皆有四願一云未度令度而衆生界未盡我願亦未盡故於真如界中大悲心內現起化身廣度衆生雖示滅度而留舍利流布世間令瞻奉供養發心生善故云願力猶在悲心尚熏也涅槃經云以勝金剛定自碎金剛身不捨於大悲舍利猶分布於是八國嚴衛四兵肅容各自捧於金壜競歸興於寶塔八國者天竺強國也四兵者象馬車步也壜者瓶屬以金為之梵云蘇鍮婆此云寶塔凡土木磚石成者但有佛舍利皆名寶塔菩薩處胎經云佛滅度後有舍利八斛四斗八國王各嚴四兵來爭乃至天龍八部皆興奪心時有智臣告曰諸王若爭須有勝負如來舍利不成利益我當分為三分一分奉諸天一分與龍神一分分八國由是衆心悅隨各將金壜盛貯迎歸本國建塔供養於是若牙若髮迦葉波禮於忉利天宮忉利天帝釋建塔有四一如來髮塔即悉達太子入雪山時自截下髮擲於空中者二箭云憍梵波提頭面禮衆中清淨大德僧象王既去象子隨太師既滅我亦滅於是化火自焚一燈滅而一燈續燈者如來正法眼喻如燈也有照暗除昏之用故淨名有無盡燈義在此也如來般涅槃時付囑大迦葉迦葉滅度付阿難阿難滅度付商那和修自下二十七祖但一人傳一人故圭峯云先祖草昧防失故一人傳一人世代已有所憑任千燈千照莫不大迦葉雲迎千衆佛既涅槃諸外道喜曰瞿曇在日教法猶火今既滅度不久撲滅時梵王帝釋與諸天王皆來請迦葉曰如來以正法眼付囑尊者宜早結集於是迦葉遣使往彌盧山頂擊銅揵椎聲中有言遍召聖弟子無學千人至摩竭提國上茆城畢鉢羅窟請阿闍世王為檀越外護結集遺教阿難陀雷吼三輪梵云阿難陀華言慶喜是佛堂弟出家之後二十年為佛侍者多聞第一初結集場中唯取無學聖人時阿難尚居學地被迦葉揖出衆阿難憤悶乃於林中習上地定斷盡煩惱殘結即證阿羅漢果即來門外白衆求入迦葉語曰若已得無學當從門隟中入阿難應聲乃入禮拜大衆迦葉請優波離集律藏阿難集經藏阿難升座衆有三疑一疑佛再出二疑他方佛來三疑阿難成佛洎阿難唱如是我聞群疑皆釋言雷吼者法句經云比丘摩訶盧達嚫聲如雷吼或以阿難比之三輪者謂聲舌語也然聲有五德一甚深如雷二清徹遠聞三聽者無厭四入心愛樂五諦了易解阿難具此故云雷吼三輪商那表定於未來如來在日遊摩突羅國指一青林謂阿難曰此名優婁茶山吾涅槃後有比丘名商那和修於此起伽藍説法教化多所利益至佛滅度後阿難弟子名商那和修阿難欲滅付法與之大行教化果如佛言商那度優波毱多長者為弟子一日至彼所坐牀上毱多諸弟子皆不識多起慢心商那乃舉手空中甘露雨下現五百法門毱多不識商那曰佛入此定目連不達目連入諸比丘不達我入汝不識我得七萬七千本生經八萬毗尼八萬毗曇汝皆不達我若去諸法門隨去也毱多化籌而盈室優婆毱多商那和修付法弟子也佛在日有外道尼犍子名薩遮聰明辨利博達衆論諸王皆拜為師然知佛法正妙欲求出家來白佛言若我出家得如佛否佛言不得又問如舍利弗目乾連乃至問如已下五百比丘否佛皆云不得若我滅後無諸大人然後如也佛語衆曰我滅近百年此外道生摩突羅國名優波毱多華言近護出家證果化人無數至期皆如佛記於中印土説法教化凡受化俗人夫婦偕得道者即擲一籌置於石室中室高二丈縱橫三丈其籌遂滿至毱多滅度弟子名通真量只用此籌闍維之始自壞梁之感大迦葉將涅槃付法與阿難已捧佛所付衣入雞足山入定待彌勒下生先阿闍世王有約尊者入滅必來告我乃往辭王睡不見王於睡夢屋之大梁折乃寤方知迦葉入滅不俟駕奔至山前其山已合先是迦葉入山時有要期云若阿闍世王來及彌勒下生此山方開洎王來山為之開見迦葉捧衣端坐其中王瞻禮悲泣讚頌訖山乃復合終乎流乳之徵西天傳法第二十四祖師子尊者在罽賓國然知有難不可苟免乃付一衣一偈與弟子婆斯多尊者語曰吾此有難汝當往他國行化其後外道昌熾譖於彌羅掘王王失正信乃毀法壞寺執劍斬師子首及白乳涌高數尺於是彼國傳法終在此人瓶器異而水必同阿含經云阿難傳持佛法猶瓶水注置餘器瓶器雖殊而水無別燈點殊而光終一燈點喻傳法人光喻如來法雖一燈分千而光明無二是以大乘之真空妙有文殊彌勒異其宗真空妙有大乘之至理也然佛法雖惟一味而投機隨根不無其別且文殊菩薩弘一性宗此克實約一切衆生皆有佛性也彌勒菩薩弘五性宗謂一聲聞性二緣覺性三大乘性四不定性此不定性謂第八識中具有三乘種子遇緣即修故云不定五無種子性此謂第八識中無聞熏種子非如瓦石之無也如善戒經云無種性人但以人天善根而成熟之小乘而分㲲析金上座大衆元其部小乘教者佛為鈍根方便施設元無別本至佛滅後師資相授互相豫盾派流遂別出三藏記云佛在日有長者夢一貴㲲忽自分為五段怖以問佛佛言此表我滅後律藏分為五部又有因緣經説頻婆娑羅王夢一枝金杖斬為一十八段以白佛佛言表我滅後小乘教分為十八部言上座大衆者二根本部也或十支宏闡此序聖弟子造論破邪立正也言十支者一略陳名數支即百法論二粗釋體義支即五蘊論皆天親菩薩造三總色衆義支即顯揚論四總攝大義支即攝大乘論皆無著菩薩造五分別名數支即雜集論無著師子覺賢慧等三菩薩造六離僻處中支即辨中邊論無著菩薩造七摧破邪山支即二十唯識論八高建法幢支即三十唯識論皆天親造九莊嚴體義支即大莊嚴論十攝散歸觀支即瑜伽論皆慈氏菩薩造或千部興天親菩薩是無著菩薩俗中親弟法中小師始宗有部造五百論明小斥大天竺無敢敵者無著是初地菩薩觀其弟大乘根緣將熟乃假疾召歸甫近一驛遣一弟子往接至夜同館宿其弟子夜誦大乘一偈云若人欲了知三世一切佛應觀法界性一切唯心造天親聞之豁然悟解大乘正理且悔昔誹斥深咎何補元其罪本但是舌根乃起手執利刀欲截其舌無著遙知伸臂捉住諭之曰汝悟大乘蓋其時矣昔以舌毀宜以舌讚可補其過苟斷舌不言其利安在天親受教乃止戴星而行洎覲本師諦聽慈旨便造大乘論纍五百部故天竺呼為千部論師焉馬鳴龍樹繼其芳此二菩薩始事外宗皆回心正法出家宣揚大乘俱為論師無著天親播其美此乃賢師哲資俱大論師已見前注或提婆鑿眸而作器提婆菩薩是龍樹弟子才敏辨義擅名五印住南天竺初得法已人未歸信其國有大自在天廟鑄金為像高二丈以頗黎寶為眼用機能動凡人不敢正視提婆入廟驗之從觀者衆時天像動眼向提婆提婆語曰神則神矣何斯小哉當以精靈感人智德伏物而假黃金自多頗黎熒惑非所望也乃登梯鑿出其眼神遂無靈由是提婆聲化大振今詳器合是氣字緣本傳無作器事蓋提婆欲揚正法鄉人未信故作氣驗神陳那吼石以飛聲陳那菩薩大論師也初劫有外道伽毗羅修世定得五神通造論名僧佉薩怛羅此云數論恐後人破我此義乃往大自在天求長生術天曰我化汝為一物最極長壽無越石也乃遍告門徒我將化石若有人難我論令書於石上我自通答洎陳那造因明論將破邪解知此石是彼外道乃書比量於上難之斯須答文隱出陳那再立量答文經宿方出至第四量難之石不能答忽大吼一聲震烈迸碎故天竺云陳那有吼石之能或百偈齊祛於外宗論師名比羅是馬鳴菩薩弟子造無我論百偈到處執我外道無不摧伏或十而翊贊於遺頌天親造三十唯識頌後有護法菩薩十大論師共造釋文贊成之今唯識論是或聞經而夜升兜率無著菩薩入法光定夜升兜率天請問慈氏金剛經義慈氏説八十頌申明大義無著約十八住處造論二卷天親約斷二十七疑造論三卷或待佛而窟寄修羅明辨論師欲求長生待慈氏下生乃往南印度修羅窟前誦金剛呪呪白芥子擊其石門石門遂開明辨攝衣奮入相隨入者六人石門乃闔矣梵云阿修羅華言無端正神也或劒誓首以要期提婆菩薩受出家法已於天竺國四衢道中敷高座作三論云一切聖中佛為第一一切法中佛法第一一切救世僧為第一八方論士有能破此義者我當斬首謝屈既鳴鼓已八方論士皆集場中亦各立要若我不能破此義者亦斬首為謝如是賓主敵論涉于三日八方論士辭義皆墮各請斬首提婆告曰我所宗法仁治萬物不斬汝首但斬汝髮與死無別於是八方論士皆剃髮出家戒象馱金而請釋天親菩薩為衆講婆沙論以一日所講之義乃造一頌攝之用赤銅葉刻字置象頭上出金五十片置象尾上自坐中間擊鼓唱言有能破此義當奉此金諸國無人能破乃將頌并金寄與罽賓國諸婆沙師亦不能盡解彼諸師却加金五十片回餉天親請作釋文天親由是自造長行釋頌即今俱舍論是或賞能而食邑論師摩陀那才辨縱橫因論義得勝頻婆娑羅王割一邑以賞之或得勝而建幢付法藏傳云馬鳴菩薩於富那夜奢處得勝法已乃建大法幢或論般若之理也名燈南天竺國論師名迦毗造論名般若燈謂根本無分別智有寂照之功故以燈為喻或究俱舍之非也名雹昔迦濕彌羅國有論師名衆賢見天親俱舍論乃造五千頌斥其非義名俱舍雹論以世間雹能壞稼穡華果故以喻為名乃將徒持論尋訪天親欲定是非天親為諸國無正人為量果遂避而未就甫近一驛衆賢忽覺氣衰不能前進乃修書遣弟子送論與天親其書略云不自量力作為此論智小謀大死期至矣菩薩抑揚至理若得存遺文則死而無恨也天親讀其論見文多順己義又重其知過乃為更名順正理論焉莫不殊塗異轍終會一源自有及空咸歸萬德殊塗異轍謂外道小乘也自有及空者皆邊見也一源萬德者謂大乘真諦實性也自商周見虹貫周書異記云穆王五十二年壬申二月十五日西方有白虹十二道南北貫連王問太史扈多奏西方聖人入滅衰相耳炎漢夢金人後漢第二主孝明帝永平二年夜夢金人丈六飛至殿庭光明炳耀且問群臣通人傅毅奏曰西方聖人號佛陛下所夢必是彼也博士王遵奏臣按周書異記云大史蘇由奏昭王曰西方有聖人出一千年後聲教來此陛下所夢即其事也教及神州聲流華夏聲亦教也此方教曲以佛無漏聲為體故云聲教又唯識論用聲名句文四法為教體矣時明帝納王遵奏乃遣中郎將蔡歆泰景博士王遵一十八人同往西域迎佛法至月支國遇迦葉摩騰竺法蘭二梵僧并白㲲畫釋迦像四十二章經白馬馱至洛下即後漢永平十年丁卯為此土有三寶之始也明帝勑圖釋迦像於西陽城門上及顯節陵上供養即此土畫像之始也有唐高僧大律師道宣居終南山以戒德律行至高北天毗沙門王常遣二天人冥佑之宣嘗經行失腳將墮階下時天人承足方現其身因問其稱是天人宣問曰如周之蘇由扈多漢之傅毅王遵吳之闞澤皆素未識佛法而能知聖人生滅聲教將來辨佛法為上彼何人耶天人黃瓊答曰彼皆天人也為佛法流行此土天遣降神佐國宣明佛法故也勃叨生季世獲奉真談雖録續而以敘金言在飄零而不逢玉相釋迦如來滅後正法五百年像法一千年末法一萬年唐三世在像法之末故云季世也三藏至真之教謂之真談也如來金口所宣謂之金言佛眉間白毫相光謂之玉相也見聞盡爾宗致昭然蓋委遺文不復備而言也乃為銘曰化起從本源化起謂三類佛身本源謂一真法界功成應賢劫如來經三無數時修六度萬行乃至三千大千世界無有如針鋒許非是如來捨命處此謂功也然燈佛授記於此賢劫成佛梵云跋陀劫簸此云賢時猶紀年之類也萬行顯真宗天真佛不從外來一切衆生各各具有但由虗妄流轉二障覆蔽不能了知故菩薩修六度萬行功德莊嚴既滿用根本無分別智照真如理於金剛道中斷盡煩惱所知二障種子集氣於解脫道中顯出法身若用藥磨鏡也三祇積鴻業梵云阿僧祇華言無數時也今略云三祗菩薩經此修六度萬行謂之鴻業為法出於世降靈示分脅無常經云若世間無老病死三法者如來則不出現及説調伏等事眉橫天帝弓華嚴經云眉細曲如帝釋弓經音云虹名天弓目帶青蓮葉肇法師云天竺有青蓮華其葉修廣青白分明有大人目相故將為喻仙師相垂淚天神爭捧接灌頂當在宮飛輪化彌帖帖靜也灌頂者轉輪聖王子將紹王位父王取四大海水灌其頂上乃冠其首爾時七寶自空而來其金輪寶飛往四天下一切國土悉自歸化宗承天日貴象貫師子頰天日者佛祖姓也師子頰聖王即日種之後是佛祖也善教誰與傳本行經云太子自七歲入學王請婆羅門毗奢蜜多羅教文羼提提婆教武頞誰那教算雖立三師而太子文武算法通達三師皆神伏所謂無師智自然智生而知之也或問此無師智自然智莫與外道自然同否答曰非也斯是常住之義雖不約緣生要假緣顯故法華經云佛種從緣起也抨彈獨豪俠經云太子年十五與衆鬥射嫌諸弓軟弱令取祖廟轉輪聖王弓來衆人皆不能施張唯太子安坐微挽而滿彈其絃聲遠邇震響由是皆伏其力遊觀驚老死逾城棄臣妾落髮親寶刀衣遇群獵寄迹狎麋鹿苦身示羸怯食糜人盡知坐草魔方懾潔若蓮出水明逾鏡開篋山海類高深雲雷等辭捷大婆娑論云如來升有餘涅槃空界興大悲雲發勝慧電震空無我雷音詞謂四辨中無礙辨也捷謂七辨中捷辨也如來具此諸辨故知一切法名相句義樂説縱橫而無遺失怖畏分別了了故三時教彌闡佛所説教有三時別第一時説有教第二時説空教破前有病第三時説中道教雙治二病故或問如來出現本為大事如何先説有教化人耶答此時執常外道多若説大乘常住之法小根之人有謗法之罪故萬類根自愜維摩經云佛以一音演説法衆生隨類各得解所謂密口一音殊類異解四問聊欲酬智度論云佛涅槃時阿難申四問一問佛滅度後諸比丘以何為師佛言以戒為師二問依何而住佛言依四念處住三問惡性比丘如何調伏佛言梵壇治之四問一切經首當置何言佛言當云如是我聞十仙度相躡見上注補處記慈氏凡一化佛滅度必授一菩薩當來何劫於此處成佛説何法度幾衆生等名為補處菩薩今釋迦佛授慈氏菩薩補處之記遺文囑迦葉涅槃經云佛言我所有無上正法悉付囑摩訶迦葉為作依止臥樹徒載春臥樹謂娑羅樹也香薪已焚㲲悲心及綿遠舍利光煒燁梵云設利羅今訛略云舍利華言骨身所以不譯者恐濫凡夫骨身故又云馱都此曰不壞義有二種一全身二碎身碎身有三種一骨舍利白色二肉舍利紅色三髮舍利黑色唯佛舍利有五色神通變化不為一切物所壞經無量劫常在具足馱多之義獨我生後時餘波幸霑涉獨我者王氏自嘆之辭生當像法之後故謂後時佛遺教謂之餘波幸小雅曰非分遇福也寶雨經云如來於一切諸法會中以法雨水灌人天頂故云霑霑者濡也漬也毛詩注云水行為涉斯謂沐法雨入法流也音義指歸云注猶源也俾尋波討源文義無失此記文皆內曲事迹不可易知今引諸經論以為注非出之胸臆也其有事實與世相違乃假問端亦引經為答所貴照我佛之化迹以釋人之疑情博達君子不以枝訶為誚焉
